  <rect x="52" y="25" width="4" height="4" rx="1" fill="#242424"/>
  <rect x="52" y="33" width="4" height="4" rx="1" fill="#242424"/>
  <rect x="52" y="41" width="4" height="4" rx="1" fill="#242424"/>
